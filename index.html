<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBONIX 2026 - Jusco School South Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-title: 'Poppins', sans-serif;
            --font-heading: 'Poppins', sans-serif;
            --font-subheading: 'Montserrat', sans-serif;
            --font-body: 'Open Sans', sans-serif;
            --size-title: clamp(24px, 3.2vw, 36px);
            --size-heading: clamp(18px, 2.2vw, 24px);
            --size-subheading: clamp(15px, 1.8vw, 19px);
            --size-body: clamp(12px, 1.4vw, 15px);
            --line-height: 1.5;
            --padding: 20px;
            --bg-dark: #0f172a;
            --bg-mid: #1e1b4b;
            --bg-black: #050505;
            --accent-blue: #38bdf8;
            --accent-purple: #c084fc;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-black);
            color: var(--text-light);
            font-family: var(--font-body);
            scroll-behavior: smooth;
        }

        @media screen {
            .slide {
                width: 95vw;
                max-width: 1600px;
                aspect-ratio: 16 / 9;
                height: auto;
                min-height: 600px;
                overflow-y: auto;
            }
        }

        .slide {
            margin: 0 auto 20px auto;
            position: relative;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid), var(--bg-black));
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 3vw;
            transition: opacity 0.3s ease;
            
            page-break-after: always;
            break-after: page;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        @page {
            size: A4 landscape;
            margin: 0;
        }

        @media print {
            body { 
                background: none; 
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                margin: 0;
            }
            .slide { 
                width: 297mm !important; 
                height: 210mm !important;
                aspect-ratio: auto !important;
                margin: 0; 
                box-shadow: none; 
                border: none; 
                overflow: hidden;
                display: flex !important;
            }
            .delete-btn, .restore-btn, .pres-controls, .toggle-container {
                display: none !important;
            }
        }

        h1.slide-title {
            font-family: var(--font-title);
            font-size: var(--size-title);
            line-height: var(--line-height);
            margin: 0 0 15px 0;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h2.heading {
            font-family: var(--font-heading);
            font-size: var(--size-heading);
            line-height: var(--line-height);
            margin: 0 0 12px 0;
            color: var(--text-light);
        }

        h3.subheading {
            font-family: var(--font-subheading);
            font-size: var(--size-subheading);
            line-height: var(--line-height);
            margin: 0 0 8px 0;
            color: var(--accent-blue);
        }

        p, li, span, td {
            font-family: var(--font-body);
            font-size: var(--size-body);
            line-height: var(--line-height);
            color: var(--text-muted);
            margin: 0 0 6px 0;
        }

        ul { margin-left: 20px; padding: 0; margin-bottom: 10px; }
        li { margin-bottom: 6px; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: var(--padding);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .image-grid {
            display: flex;
            gap: 15px;
            margin-top: auto;
            align-items: stretch;
            min-height: 80px;
            padding-top: 10px;
        }
        .image-grid img {
            flex: 1;
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }
        .image-grid.single-col { flex-direction: column; }
        .image-grid.single-col img { max-height: 240px; }

        .layout-side {
            display: flex;
            gap: 25px;
            flex: 1;
        }
        .layout-side > .glass-panel { width: 50%; }

        .layout-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
        }
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex: 1;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: var(--padding);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .columns {
            display: flex;
            gap: 30px;
            flex: 1;
        }
        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .layout-title {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex: 1;
            background: radial-gradient(circle at center, var(--bg-mid), var(--bg-black));
        }

        .badge {
            display: inline-block;
            background: var(--accent-purple);
            color: #fff;
            font-family: var(--font-subheading);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 15px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            align-self: flex-start;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border-bottom: 1px solid var(--glass-border);
            padding: 8px 6px;
            text-align: left;
            font-size: var(--size-body);
        }
        th { color: var(--accent-blue); font-family: var(--font-subheading); }
        .marks { text-align: right; color: var(--accent-purple); font-weight: bold; }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .delete-btn:hover { background-color: rgba(239, 68, 68, 1); }

        .restore-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--accent-blue);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-family: var(--font-title);
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }
        .restore-btn:hover { background-color: #7dd3fc; transform: translateY(-2px); }

        /* --- PRESENTATION UI CSS --- */
        .toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--glass-bg);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        #fullscreen-btn {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: var(--font-subheading);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(192, 132, 252, 0.4);
            transition: background 0.3s, transform 0.2s;
        }
        #fullscreen-btn:hover { background: #d8b4fe; transform: scale(1.05); }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        .pres-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
            z-index: 1001;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .nav-btn {
            background: var(--accent-blue);
            color: var(--bg-black);
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .nav-btn:hover:not(:disabled) { transform: scale(1.05); background: #7dd3fc; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- MAXIMIZED PRESENTATION MODE CSS --- */
        body.presentation-active {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: block; 
            background-color: var(--bg-black);
        }

        body.presentation-active .slide {
            display: none; 
        }

        body.presentation-active .slide.active {
            display: flex;
            width: 100vw !important;
            height: 100vh !important;
            max-width: none;
            max-height: none;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            padding: 3vw 3vw 100px 3vw !important; /* Space for buttons */
            overflow: hidden !important;
            animation: fadeIn 0.4s ease;
            transform-origin: top left;
        }

        body.presentation-active .delete-btn {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE STACKING: MOBILE & TABLET --- */
        @media (max-width: 950px) {
            .slide {
                width: 100vw !important;
                aspect-ratio: auto !important; 
                min-height: 100vh !important;
                border-radius: 0;
                padding: 5vw !important;
            }
            
            .layout-side { flex-direction: column !important; }
            .layout-side > .glass-panel { width: 100% !important; }
            .columns { flex-direction: column !important; gap: 15px !important; }
            .grid-cards { grid-template-columns: 1fr !important; gap: 15px !important; }
            
            .image-grid { flex-wrap: wrap; }
            .image-grid img { width: 100%; min-width: 100%; }

            .toggle-container {
                top: 10px;
                right: 10px;
                transform: scale(0.85);
                transform-origin: top right;
                padding: 8px 12px;
                gap: 8px;
            }
            .pres-controls {
                bottom: 10px;
                transform: translateX(-50%) scale(0.85);
            }

            body.presentation-active .slide.active {
                padding-bottom: 90px !important;
            }
        }

        @media (max-width: 950px) and (orientation: landscape) {
            body.presentation-active .slide.active {
                padding: 2vh 2vw 72px 2vw !important;
            }

            .slide {
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body>

    <div class="toggle-container" id="top-controls">
        <button id="fullscreen-btn" onclick="toggleFullscreen()">ENTER FULLSCREEN</button>
        <span style="font-family: var(--font-subheading); font-size: 14px; color: var(--accent-blue); font-weight: bold;">PRESENTATION MODE</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle" onclick="togglePresentationMode()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="pres-controls" id="pres-controls">
        <button class="nav-btn" onclick="prevSlide()" id="prev-btn">⬅ PREV</button>
        <button class="nav-btn" onclick="nextSlide()" id="next-btn">NEXT ➡</button>
    </div>

    <button id="restore-btn" class="restore-btn" onclick="restoreSlide()">↺ Restore Slide</button>

    <div id="presentation"></div>

    <script>
        let deletedSlidesStack = [];
        let currentSlideIndex = 0;
        let isPresentationMode = false;

        function deleteSlide(btn) {
            const slide = btn.closest('.slide');
            const placeholder = document.createElement('div');
            placeholder.style.display = 'none'; 
            slide.parentNode.insertBefore(placeholder, slide);
            
            deletedSlidesStack.push({ slide: slide, placeholder: placeholder });
            slide.remove();
            
            updateRestoreButton();
            if(isPresentationMode) syncSlides();
        }

        function restoreSlide() {
            if (deletedSlidesStack.length === 0) return;
            const lastDeleted = deletedSlidesStack.pop();
            lastDeleted.placeholder.parentNode.insertBefore(lastDeleted.slide, lastDeleted.placeholder);
            lastDeleted.placeholder.remove();
            
            updateRestoreButton();
            if(isPresentationMode) syncSlides();
        }

        function updateRestoreButton() {
            const restoreBtn = document.getElementById('restore-btn');
            if (deletedSlidesStack.length > 0) {
                restoreBtn.style.display = 'block';
                restoreBtn.innerText = '↺ Restore Slide (' + deletedSlidesStack.length + ')';
            } else {
                restoreBtn.style.display = 'none';
            }
        }

        function syncSlides() {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            
            if (currentSlideIndex >= slides.length) currentSlideIndex = slides.length - 1;
            if (currentSlideIndex < 0) currentSlideIndex = 0;

            slides.forEach((s, idx) => {
                if (idx === currentSlideIndex) {
                    s.classList.add('active');
                    s.scrollTop = 0;
                } else {
                    s.classList.remove('active');
                }
            });

            document.getElementById('prev-btn').disabled = (currentSlideIndex === 0);
            document.getElementById('next-btn').disabled = (currentSlideIndex === slides.length - 1);
            fitActiveSlideToViewport();
        }

        function fitActiveSlideToViewport() {
            const slide = document.querySelector('.slide.active');
            if (!slide) return;

            slide.style.transform = '';
            slide.style.width = '';
            slide.style.height = '';

            const mobileLandscape = window.matchMedia("(max-width: 950px) and (orientation: landscape)").matches;
            if (!isPresentationMode || !mobileLandscape) return;

            const controls = document.getElementById('pres-controls');
            const controlsHeight = controls && controls.style.display !== 'none' ? controls.offsetHeight + 20 : 0;
            const availableWidth = window.innerWidth;
            const availableHeight = Math.max(240, window.innerHeight - controlsHeight);

            const contentWidth = Math.max(slide.scrollWidth, availableWidth);
            const contentHeight = Math.max(slide.scrollHeight, availableHeight);
            const scale = Math.min(1, availableWidth / contentWidth, availableHeight / contentHeight);

            slide.style.width = (availableWidth / scale) + "px";
            slide.style.height = (availableHeight / scale) + "px";
            slide.style.transform = `scale(${scale})`;
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                syncSlides();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                syncSlides();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!isPresentationMode) return;
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        // =========================================================================
        // ✅ NEW: UNIFIED YOUTUBE-STYLE FULLSCREEN & ORIENTATION LOCK LOGIC
        // =========================================================================
        
        function requestFSAndLock() {
            const doc = document.documentElement;
            let requestFS = doc.requestFullscreen || doc.webkitRequestFullscreen || doc.msRequestFullscreen;
            if (requestFS) {
                let promise = requestFS.call(doc);
                if (promise !== undefined) {
                    promise.then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log(e));
                        }
                    }).catch(err => console.log(err));
                } else {
                    setTimeout(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log(e));
                        }
                    }, 300);
                }
            }
        }

        function exitFSAndUnlock() {
            let exitFS = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
            if (exitFS && (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement)) {
                exitFS.call(document);
            }
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        }

        function updatePresentationUI(active) {
            const controls = document.getElementById('pres-controls');
            const fsBtn = document.getElementById('fullscreen-btn');
            
            if (active) {
                document.body.classList.add('presentation-active');
                controls.style.display = 'flex';
                fsBtn.innerText = "EXIT FULLSCREEN";
                syncSlides();
                fitActiveSlideToViewport();
            } else {
                document.body.classList.remove('presentation-active');
                controls.style.display = 'none';
                fsBtn.innerText = "ENTER FULLSCREEN";
                const slides = document.querySelectorAll('.slide');
                slides.forEach(s => {
                    s.style.display = ''; 
                    s.classList.remove('active');
                    s.style.transform = '';
                    s.style.width = '';
                    s.style.height = '';
                });
            }
        }

        function togglePresentationMode() {
            isPresentationMode = document.getElementById('mode-toggle').checked;
            if (isPresentationMode) {
                requestFSAndLock();
            } else {
                exitFSAndUnlock();
            }
            updatePresentationUI(isPresentationMode);
        }

        function toggleFullscreen() {
            isPresentationMode = !isPresentationMode;
            document.getElementById('mode-toggle').checked = isPresentationMode;
            
            if (isPresentationMode) {
                requestFSAndLock();
            } else {
                exitFSAndUnlock();
            }
            updatePresentationUI(isPresentationMode);
        }

        // Sync UI if user exits fullscreen via browser (like hitting ESC)
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('msfullscreenchange', handleFullscreenChange);

        function handleFullscreenChange() {
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
            if (!isFullscreen && isPresentationMode) {
                isPresentationMode = false;
                document.getElementById('mode-toggle').checked = false;
                updatePresentationUI(false);
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        window.addEventListener('resize', fitActiveSlideToViewport);
        window.addEventListener('orientationchange', () => {
            setTimeout(fitActiveSlideToViewport, 150);
        });

        // =========================================================================
        // DATA & HTML GENERATION LOGIC
        // =========================================================================
        const eventsList = [
            { category: "TECH & ROBOTICS", name: "Codebuster", keyword: "coding" },
            { category: "TECH & ROBOTICS", name: "Line Follower", keyword: "robotics" },
            { category: "TECH & ROBOTICS", name: "Robo War", keyword: "battle-robot" },
            { category: "TECH & ROBOTICS", name: "Robo Race", keyword: "robot-race" },
            { category: "TECH & ROBOTICS", name: "Robo Pick and Place", keyword: "robotic-arm" },
            { category: "TECH & ROBOTICS", name: "Website Designing", keyword: "web-design" },
            { category: "TECH & ROBOTICS", name: "Model Making", keyword: "architectural-model" },
            { category: "ESPORTS", name: "Free Fire", keyword: "gaming-mobile" },
            { category: "ESPORTS", name: "BGMI", keyword: "esports" },
            { category: "CULTURAL", name: "Dance", keyword: "dance-performance" },
            { category: "CULTURAL", name: "Ramp Walk", keyword: "fashion-show" },
            { category: "CULTURAL", name: "Singing", keyword: "singer-concert" },
            { category: "CULTURAL", name: "Poetry", keyword: "poetry-reading" },
            { category: "CULTURAL", name: "Storytelling", keyword: "storytelling" },
            { category: "CULTURAL", name: "Beatboxing", keyword: "beatbox" },
            { category: "CULTURAL", name: "Skit", keyword: "theatre-drama" },
            { category: "CULTURAL", name: "Debate", keyword: "public-speaking" },
            { category: "CREATIVE", name: "Face Painting", keyword: "face-paint" },
            { category: "CREATIVE", name: "Stand Painting", keyword: "stand-art" },
            { category: "CREATIVE", name: "Pot Painting", keyword: "painting-canvas" },
            { category: "CREATIVE", name: "Stone Painting", keyword: "stone-art" },
            { category: "CREATIVE", name: "Cooking", keyword: "chef-cooking" },
            { category: "CREATIVE", name: "Videography", keyword: "filmmaking" },
            { category: "CREATIVE", name: "Photography", keyword: "photography-camera" },
            { category: "INTELLECTUAL", name: "Quiz", keyword: "quiz-trivia" },
            { category: "INTELLECTUAL", name: "Sudoku", keyword: "sudoku-puzzle" },
            { category: "INTELLECTUAL", name: "Chess", keyword: "chess-board" },
            { category: "SPORTS", name: "Cricket", keyword: "cricket-match" },
            { category: "SPORTS", name: "Football", keyword: "football-stadium" }
        ];

        function getCategoryData(category, name) {
            let guidelines, criteria, objective, theme, requirements, allowed, notAllowed, disq, strategy, proTip;

            if (category === "TECH & ROBOTICS") {
                objective = `To design, build, and deploy an automated or manually controlled system to conquer the ${name} arena.`;
                theme = "Automation, Precision, and Futuristic Mechanics.";
                requirements = ["Custom-built hardware/software", "Power supply strictly under 12V", "Safety switches integrated", "Technical documentation portfolio"];
                criteria = [
                    { crit: "Design & Build Quality", marks: 30 },
                    { crit: "Task Completion / Speed", marks: 40 },
                    { crit: "Innovation & Logic", marks: 20 },
                    { crit: "Team Coordination", marks: 10 }
                ];
                allowed = ["Spare batteries", "Basic toolkits", "Pre-written libraries"];
                notAllowed = ["Jamming devices", "Flammable materials", "Off-the-shelf kits"];
                disq = ["Damaging the official arena.", "Touching the bot without permission.", "Using prohibited voltages."];
                strategy = "Focus on reliability over raw speed. A slow but consistent system beats a fast but unstable one.";
